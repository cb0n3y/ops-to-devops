---
- name: Configure Prometheus Repository
  ansible.builtin.template:
    src: prometheus.repo.j2
    dest: /etc/yum.repos.d/prometheus.repo
    owner: root
    group: root
    mode: "0644"

- name: Import Prometheus GPG keys
  ansible.builtin.rpm_key:
    state: present
    key: "{{ item }}"
  loop:
    - https://packagecloud.io/prometheus-rpm/release/gpgkey
    - https://raw.githubusercontent.com/lest/prometheus-rpm/master/RPM-GPG-KEY-prometheus-rpm

- name: Install Prometheus on RedHat
  ansible.builtin.yum:
    name: "{{ prometheus_packages }}"
    state: present
    update_cache: yes

- name: Ensure Prometheus is running
  ansible.builtin.systemd:
    name: prometheus
    enabled: true
    state: started
